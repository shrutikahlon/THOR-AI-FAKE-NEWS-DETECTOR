<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Fake News Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 1.5rem;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #888;
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: #b0b0b0;
            font-size: 0.9rem;
        }

        .section {
            margin-bottom: 3rem;
        }

        .section h2 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            color: #888;
        }

        .data-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            overflow: hidden;
        }

        .table-header {
            background: rgba(136, 136, 136, 0.1);
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .table-row {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: grid;
            gap: 1rem;
            align-items: center;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .user-id { width: 60px; }
        .user-name { width: 150px; }
        .user-email { flex: 1; }
        .user-analyses { width: 80px; text-align: center; }
        .user-date { width: 120px; }

        .refresh-btn {
            background: linear-gradient(135deg, #888, #666);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-bottom: 1rem;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(136, 136, 136, 0.3);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: #888;
        }

        .error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
            padding: 1rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .back-link {
            display: inline-block;
            color: #888;
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-link">← Back to App</a>
        
        <div class="header">
            <h1>Admin Dashboard</h1>
            <p>View backend data and statistics</p>
        </div>

        <div class="stats-section">
            <button class="refresh-btn" onclick="loadStats()">Refresh Stats</button>
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="total-users">-</div>
                    <div class="stat-label">Total Users</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="total-analyses">-</div>
                    <div class="stat-label">Total Analyses</div>
                </div>
            </div>
        </div>

        <div class="section">
            <button class="refresh-btn" onclick="loadUsers()">Refresh Users</button>
            <h2>Registered Users</h2>
            <div class="data-table">
                <div class="table-header">
                    <div class="table-row">
                        <div class="user-id">ID</div>
                        <div class="user-name">Name</div>
                        <div class="user-email">Email</div>
                        <div class="user-analyses">Analyses</div>
                        <div class="user-date">Joined</div>
                    </div>
                </div>
                <div id="users-list">
                    <div class="loading">Loading users...</div>
                </div>
            </div>
        </div>

        <div class="section">
            <button class="refresh-btn" onclick="loadAnalyses()">Refresh Analyses</button>
            <h2>Recent Analyses</h2>
            <div class="data-table">
                <div class="table-header">
                    <div class="table-row">
                        <div class="user-id">ID</div>
                        <div class="user-name">User</div>
                        <div class="user-email">Result</div>
                        <div class="user-analyses">Confidence</div>
                        <div class="user-date">Date</div>
                    </div>
                </div>
                <div id="analyses-list">
                    <div class="loading">Loading analyses...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000/api';

        async function fetchData(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return await response.json();
            } catch (error) {
                console.error('Fetch error:', error);
                throw error;
            }
        }

        async function loadStats() {
            try {
                const stats = await fetchData('/admin/stats');
                document.getElementById('total-users').textContent = stats.totalUsers;
                document.getElementById('total-analyses').textContent = stats.totalAnalyses;
            } catch (error) {
                showError('Failed to load stats: ' + error.message);
            }
        }

        async function loadUsers() {
            const usersList = document.getElementById('users-list');
            usersList.innerHTML = '<div class="loading">Loading users...</div>';
            
            try {
                const data = await fetchData('/admin/users');
                
                if (data.users.length === 0) {
                    usersList.innerHTML = '<div class="table-row">No users found</div>';
                    return;
                }

                usersList.innerHTML = data.users.map(user => `
                    <div class="table-row">
                        <div class="user-id">${user.id}</div>
                        <div class="user-name">${user.name}</div>
                        <div class="user-email">${user.email}</div>
                        <div class="user-analyses">${user.analyses || 0}</div>
                        <div class="user-date">${new Date(user.created_at).toLocaleDateString()}</div>
                    </div>
                `).join('');
            } catch (error) {
                usersList.innerHTML = '<div class="error">Failed to load users: ' + error.message + '</div>';
            }
        }

        async function loadAnalyses() {
            const analysesList = document.getElementById('analyses-list');
            analysesList.innerHTML = '<div class="loading">Loading analyses...</div>';
            
            try {
                const data = await fetchData('/admin/analysis-history');
                
                if (data.analyses.length === 0) {
                    analysesList.innerHTML = '<div class="table-row">No analyses found</div>';
                    return;
                }

                analysesList.innerHTML = data.analyses.map(analysis => `
                    <div class="table-row">
                        <div class="user-id">${analysis.id}</div>
                        <div class="user-name">${analysis.name}</div>
                        <div class="user-email">${analysis.result}</div>
                        <div class="user-analyses">${analysis.confidence}%</div>
                        <div class="user-date">${new Date(analysis.created_at).toLocaleDateString()}</div>
                    </div>
                `).join('');
            } catch (error) {
                analysesList.innerHTML = '<div class="error">Failed to load analyses: ' + error.message + '</div>';
            }
        }

        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error';
            errorDiv.textContent = message;
            document.querySelector('.container').insertBefore(errorDiv, document.querySelector('.stats-section'));
            
            setTimeout(() => {
                if (errorDiv.parentNode) {
                    errorDiv.parentNode.removeChild(errorDiv);
                }
            }, 5000);
        }

        // Load data on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadUsers();
            loadAnalyses();
        });
    </script>
</body>
</html>
